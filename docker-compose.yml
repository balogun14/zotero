services:
  library:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - AI_API_KEY=${AI_API_KEY:?Set AI_API_KEY in your environment}
      - DATABASE_URL=file:/app/data/library.db
    volumes:
      - ./data:/app/data
    restart: unless-stopped
